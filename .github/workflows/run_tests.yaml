name: check
env:
  INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
  INSTAGRAM_SESSION: ${{ secrets.INSTAGRAM_SESSION_JSON }}
on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: test with ${{ matrix.py }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: herif_bot_test
        # Set health checks to ensure Postgres is ready before tests start
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    strategy:
      fail-fast: false
      matrix:
        py:
          - "3.12"
          # - "3.11"
          #- "3.10"
        os:
          - ubuntu-latest
          #- macos-latest
          #- windows-latest
    steps:
      - uses: actions/checkout@v3
        with:
          lfs: 'true'
          fetch-depth: 0
      - name: setup ffmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg
      # Install uv and python
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.py }}
      - name: Install All Deps
      # Prepare Pytest environment
        run: uv sync
      - name: Run test suite
        env:
          SQL_CONNECTION_STRING: postgresql://postgres:password@localhost:5432/herif_bot_test
        run: uv run pytest .
